<!-- Hunting Events Tab Content -->

<!-- Search Tile -->
<div class="events-tile events-search-tile">
    <div class="tile-header">
        <h3 class="tile-title">🔍 Search Events</h3>
    </div>
    <div class="tile-body">
        <div class="search-row">
            <input type="text" class="form-input events-search-input" id="events-search" placeholder="Search across all events...">
            <button class="btn btn-primary" id="events-search-btn" onclick="searchEvents()">
                Search
            </button>
        </div>
    </div>
</div>

<!-- Filter Tile -->
<div class="events-tile events-filter-tile">
    <div class="tile-header">
        <h3 class="tile-title">⚙️ Filters</h3>
    </div>
    <div class="tile-body">
        <div class="filter-grid">
            <!-- Event Type Column -->
            <div class="filter-column">
                <h4 class="filter-column-title">Event Type</h4>
                <label class="filter-checkbox">
                    <input type="checkbox" id="filter-evtx" checked onchange="applyFilters()">
                    <span class="checkmark"></span>
                    <span class="filter-label">EVTX Files</span>
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" id="filter-firewall" checked onchange="applyFilters()">
                    <span class="checkmark"></span>
                    <span class="filter-label">Firewall Logs</span>
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" id="filter-edr" checked onchange="applyFilters()">
                    <span class="checkmark"></span>
                    <span class="filter-label">EDR Platforms</span>
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" id="filter-other" checked onchange="applyFilters()">
                    <span class="checkmark"></span>
                    <span class="filter-label">Other</span>
                </label>
            </div>
            
            <!-- Alert Type Column -->
            <div class="filter-column">
                <h4 class="filter-column-title">Alert Type</h4>
                <label class="filter-checkbox">
                    <input type="checkbox" id="filter-sigma" checked onchange="applyFilters()">
                    <span class="checkmark"></span>
                    <span class="filter-label">SIGMA Violations</span>
                </label>
                <label class="filter-checkbox filter-placeholder">
                    <input type="checkbox" id="filter-ioc" checked onchange="applyFilters()" disabled>
                    <span class="checkmark"></span>
                    <span class="filter-label">IOCs Found</span>
                    <span class="filter-soon">Soon</span>
                </label>
                <label class="filter-checkbox filter-placeholder">
                    <input type="checkbox" id="filter-analyst" checked onchange="applyFilters()" disabled>
                    <span class="checkmark"></span>
                    <span class="filter-label">Analyst Tagged</span>
                    <span class="filter-soon">Soon</span>
                </label>
                <label class="filter-checkbox filter-placeholder">
                    <input type="checkbox" id="filter-ai" checked onchange="applyFilters()" disabled>
                    <span class="checkmark"></span>
                    <span class="filter-label">AI Tagged</span>
                    <span class="filter-soon">Soon</span>
                </label>
            </div>
            
            <!-- Display Column -->
            <div class="filter-column">
                <h4 class="filter-column-title">Display</h4>
                <label class="filter-checkbox filter-placeholder">
                    <input type="checkbox" id="filter-noise" onchange="applyFilters()" disabled>
                    <span class="checkmark"></span>
                    <span class="filter-label">Noise Events</span>
                    <span class="filter-soon">Soon</span>
                </label>
            </div>
        </div>
    </div>
</div>

<!-- Events List Tile -->
<div class="events-tile events-list-tile">
    <div class="tile-header">
        <h3 class="tile-title">📋 Events</h3>
        <div class="tile-controls">
            <span class="events-count" id="events-count">Loading...</span>
            <select class="page-size-select" id="events-page-size" onchange="changeEventsPageSize()">
                <option value="50" selected>50 per page</option>
                <option value="100">100 per page</option>
                <option value="200">200 per page</option>
                <option value="500">500 per page</option>
            </select>
        </div>
    </div>
    <div class="tile-body events-table-container">
        <table class="events-table" id="events-table">
            <thead>
                <tr>
                    <th class="col-timestamp">Timestamp</th>
                    <th class="col-parser">Parser</th>
                    <th class="col-hostname">Hostname</th>
                    <th class="col-description">Description</th>
                    <th class="col-severity">Severity</th>
                </tr>
            </thead>
            <tbody id="events-tbody">
                <tr>
                    <td colspan="5" class="text-center text-muted loading-row">
                        <span class="spinner-border spinner-border-sm"></span> Loading events...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="tile-footer">
        <div class="pagination-info">
            Showing <span id="events-showing-start">0</span> - <span id="events-showing-end">0</span> of <span id="events-total">0</span> events
        </div>
        <div class="pagination-controls">
            <button class="btn btn-secondary btn-sm" id="events-btn-prev" onclick="prevEventsPage()" disabled>← Prev</button>
            <span class="page-indicator">Page <span id="events-current-page">1</span> of <span id="events-total-pages">1</span></span>
            <button class="btn btn-secondary btn-sm" id="events-btn-next" onclick="nextEventsPage()" disabled>Next →</button>
        </div>
    </div>
</div>
