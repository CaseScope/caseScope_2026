{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div class="page-title-section">
        <h1 class="page-title">
            <span class="page-title-icon">🎯</span>
            Hunting
        </h1>
        <p class="page-subtitle">{{ case.name }} - {{ case.company }}</p>
    </div>
</div>

<div class="tile-row">
    <div class="tile tile-hunting">
        <div class="tile-header">
            <div class="hunting-tabs">
                <button class="hunting-tab active" data-tab="events" data-types="evtx,firewall,huntress,sonicwall,json_log,csv_log">
                    <span class="tab-icon">📋</span>
                    <span class="tab-text">Events</span>
                </button>
                <button class="hunting-tab" data-tab="browsers" data-types="browser,browser_history,browser_cookies,browser_forms,browser_logins,browser_autofill,firefox_session,firefox_addon,firefox_search_engine,firefox_handler,firefox_json,webcache,webcache_history,webcache_cookies,webcache_cache,webcache_downloads">
                    <span class="tab-icon">🌐</span>
                    <span class="tab-text">Browsers</span>
                </button>
                <button class="hunting-tab" data-tab="filesystem" data-types="prefetch,lnk,jumplist,mft">
                    <span class="tab-icon">📁</span>
                    <span class="tab-text">File System</span>
                </button>
                <button class="hunting-tab" data-tab="registry" data-types="registry">
                    <span class="tab-icon">🗂️</span>
                    <span class="tab-text">Registry</span>
                </button>
                <button class="hunting-tab" data-tab="iis" data-types="iis">
                    <span class="tab-icon">🖥️</span>
                    <span class="tab-text">IIS</span>
                </button>
                <button class="hunting-tab" data-tab="tasks" data-types="scheduled_task">
                    <span class="tab-icon">⏰</span>
                    <span class="tab-text">Tasks</span>
                </button>
                <button class="hunting-tab" data-tab="activity" data-types="srum,activities_cache,activity_operation">
                    <span class="tab-icon">📊</span>
                    <span class="tab-text">Apps & Network</span>
                </button>
            </div>
        </div>
        <div class="tile-body hunting-content">
            {% include 'hunting/tab_events.html' %}
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const caseId = {{ case.id }};
let eventsPage = 1;
let eventsPerPage = 50;
let eventsSearch = '';
let currentArtifactTypes = 'evtx,firewall,huntress,sonicwall,json_log,csv_log'; // Default to Events tab

// Filter state
const eventFilters = {
    // Event Type filters - maps to artifact_type values
    evtx: true,       // evtx
    firewall: true,   // firewall, sonicwall
    edr: true,        // huntress
    other: true,      // prefetch, registry, lnk, jumplist, mft, srum, iis, json_log, csv_log, browser, etc.
    
    // Alert Type filters
    alertMode: 'all', // 'all' = show all, uncheck to hide; 'only' = show only checked types
    sigma: true,      // Show events with rule_level (Hayabusa/SIGMA hits)
    ioc: true,        // Placeholder
    analyst: true,    // Placeholder
    ai: true,         // Placeholder
    
    // SIGMA Filtering - severity levels
    severityInfo: true,
    severityLow: true,
    severityMedium: true,
    severityHigh: true,  // Includes high and critical
    
    // Display filters
    noise: false      // Placeholder - show noise events
};

// Artifact type mappings for filters
const EVTX_TYPES = ['evtx'];
const FIREWALL_TYPES = ['firewall', 'sonicwall'];
const EDR_TYPES = ['huntress'];

// Tab switching
document.addEventListener('DOMContentLoaded', function() {
    const tabs = document.querySelectorAll('.hunting-tab');
    
    tabs.forEach(tab => {
        tab.addEventListener('click', function() {
            // Update active tab
            tabs.forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            
            // Get artifact types for this tab
            currentArtifactTypes = this.dataset.types || '';
            
            // Reset pagination and search when switching tabs
            eventsPage = 1;
            eventsSearch = '';
            document.getElementById('events-search').value = '';
            
            // Reload events with new filter
            loadEvents();
        });
    });
    
    // Load events on page load
    loadEvents();
    
    // Search on Enter key
    document.getElementById('events-search').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') {
            searchEvents();
        }
    });
});

// Apply filters - called when any checkbox changes
function applyFilters() {
    // Read filter state from checkboxes
    eventFilters.evtx = document.getElementById('filter-evtx').checked;
    eventFilters.firewall = document.getElementById('filter-firewall').checked;
    eventFilters.edr = document.getElementById('filter-edr').checked;
    eventFilters.other = document.getElementById('filter-other').checked;
    
    // Alert Type mode and filters
    eventFilters.alertMode = document.getElementById('alert-filter-mode').value;
    eventFilters.sigma = document.getElementById('filter-sigma').checked;
    // Placeholders - read but not used yet
    // eventFilters.ioc = document.getElementById('filter-ioc').checked;
    // eventFilters.analyst = document.getElementById('filter-analyst').checked;
    // eventFilters.ai = document.getElementById('filter-ai').checked;
    
    // SIGMA Filtering - severity levels
    eventFilters.severityInfo = document.getElementById('filter-severity-info').checked;
    eventFilters.severityLow = document.getElementById('filter-severity-low').checked;
    eventFilters.severityMedium = document.getElementById('filter-severity-medium').checked;
    eventFilters.severityHigh = document.getElementById('filter-severity-high').checked;
    
    // Display filters - placeholder
    // eventFilters.noise = document.getElementById('filter-noise').checked;
    
    // Reset to page 1 and reload
    eventsPage = 1;
    loadEvents();
}

// Build artifact types string based on active filters
function getFilteredArtifactTypes() {
    // Get tab's base artifact types
    const tabTypes = currentArtifactTypes.split(',').filter(t => t.trim());
    
    // If tab is not "Events" (has specific types like browser), return as-is
    // The filters only apply to the Events tab
    const isEventsTab = tabTypes.some(t => EVTX_TYPES.includes(t) || FIREWALL_TYPES.includes(t) || EDR_TYPES.includes(t));
    if (!isEventsTab) {
        return currentArtifactTypes;
    }
    
    // Build filtered list based on checkboxes
    let filteredTypes = [];
    
    if (eventFilters.evtx) {
        filteredTypes.push(...EVTX_TYPES);
    }
    if (eventFilters.firewall) {
        filteredTypes.push(...FIREWALL_TYPES);
    }
    if (eventFilters.edr) {
        filteredTypes.push(...EDR_TYPES);
    }
    if (eventFilters.other) {
        // "Other" includes everything in tab that's not EVTX, Firewall, or EDR
        const otherTypes = tabTypes.filter(t => 
            !EVTX_TYPES.includes(t) && 
            !FIREWALL_TYPES.includes(t) && 
            !EDR_TYPES.includes(t)
        );
        filteredTypes.push(...otherTypes);
    }
    
    return filteredTypes.join(',');
}

// Build severity levels string based on checked filters
function getSeverityLevels() {
    const levels = [];
    if (eventFilters.severityInfo) levels.push('info', 'informational');
    if (eventFilters.severityLow) levels.push('low');
    if (eventFilters.severityMedium) levels.push('med', 'medium');
    if (eventFilters.severityHigh) levels.push('high', 'crit', 'critical');
    return levels.join(',');
}

// Load events from API
function loadEvents() {
    // Build types based on filters
    const filteredTypes = getFilteredArtifactTypes();
    
    // Determine sigma filter mode based on alertMode dropdown
    // 'all' mode: show all events, uncheck SIGMA to hide sigma hits
    // 'only' mode: show only events matching checked alert types
    let sigmaFilter = '';
    if (eventFilters.alertMode === 'all') {
        // All Events mode: unchecking hides those events
        sigmaFilter = eventFilters.sigma ? '' : 'exclude';
    } else {
        // Only These mode: only show events matching checked types
        sigmaFilter = eventFilters.sigma ? 'only' : 'exclude_all';
    }
    
    // Build severity levels filter
    const severityLevels = getSeverityLevels();
    
    // Build params
    const params = new URLSearchParams({
        page: eventsPage,
        per_page: eventsPerPage,
        search: eventsSearch,
        types: filteredTypes,
        alert_mode: eventFilters.alertMode,
        sigma_filter: sigmaFilter,
        severity_levels: severityLevels
    });
    
    // Show loading state
    document.getElementById('events-tbody').innerHTML = `
        <tr>
            <td colspan="5" class="text-center text-muted loading-row">
                <span class="spinner-border spinner-border-sm"></span> Loading...
            </td>
        </tr>
    `;
    
    fetch('/api/hunting/events/' + caseId + '?' + params.toString())
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                renderEventsTable(data.events);
                updateEventsPagination(data);
            } else {
                showEventsError('Error loading events: ' + data.error);
            }
        })
        .catch(err => {
            console.error('Error loading events:', err);
            showEventsError('Error loading events');
        });
}

// Render events table
function renderEventsTable(events) {
    const tbody = document.getElementById('events-tbody');
    
    if (events.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="5" class="text-center text-muted" style="padding: 40px;">
                    ${eventsSearch ? 'No events match your search' : 'No events found for this category.'}
                </td>
            </tr>
        `;
        return;
    }
    
    tbody.innerHTML = events.map(e => {
        const hasHit = e.rule_level && e.rule_level !== '';
        const rowClass = hasHit ? 'event-row hayabusa-hit' : 'event-row';
        const severityBadge = getSeverityBadge(e.rule_level);
        
        return `
            <tr class="${rowClass}">
                <td class="col-timestamp">${e.timestamp}</td>
                <td class="col-parser"><span class="parser-badge">${e.artifact_type}</span></td>
                <td class="col-hostname">${e.source_host || '-'}</td>
                <td class="col-description" title="${escapeHtml(e.description)}">${truncateText(e.description, 120)}</td>
                <td class="col-severity">${severityBadge}</td>
            </tr>
        `;
    }).join('');
}

// Get severity badge HTML based on rule_level
function getSeverityBadge(ruleLevel) {
    if (!ruleLevel || ruleLevel === '') return '';
    
    const level = ruleLevel.toLowerCase();
    
    if (level === 'critical' || level === 'crit' || level === 'high') {
        return '<span class="badge badge-severity-critical">CRITICAL</span>';
    } else if (level === 'medium' || level === 'med') {
        return '<span class="badge badge-severity-medium">MEDIUM</span>';
    } else if (level === 'low') {
        return '<span class="badge badge-severity-low">LOW</span>';
    } else if (level === 'info' || level === 'informational') {
        return '<span class="badge badge-severity-info">INFO</span>';
    }
    
    // Unknown level - show as-is
    return `<span class="badge badge-muted">${escapeHtml(ruleLevel.toUpperCase())}</span>`;
}

// Update pagination controls
function updateEventsPagination(data) {
    document.getElementById('events-current-page').textContent = data.page;
    document.getElementById('events-total-pages').textContent = data.total_pages;
    document.getElementById('events-total').textContent = data.total.toLocaleString();
    document.getElementById('events-count').textContent = data.total.toLocaleString() + ' events';
    
    const start = data.total > 0 ? ((data.page - 1) * data.per_page) + 1 : 0;
    const end = Math.min(data.page * data.per_page, data.total);
    document.getElementById('events-showing-start').textContent = start.toLocaleString();
    document.getElementById('events-showing-end').textContent = end.toLocaleString();
    
    document.getElementById('events-btn-prev').disabled = data.page <= 1;
    document.getElementById('events-btn-next').disabled = data.page >= data.total_pages;
}

// Show error message
function showEventsError(message) {
    const tbody = document.getElementById('events-tbody');
    tbody.innerHTML = `
        <tr>
            <td colspan="5" class="text-center text-danger" style="padding: 40px;">
                ${message}
            </td>
        </tr>
    `;
    document.getElementById('events-count').textContent = 'Error';
}

// Search events
function searchEvents() {
    eventsSearch = document.getElementById('events-search').value.trim();
    eventsPage = 1;
    loadEvents();
}

// Pagination functions
function prevEventsPage() {
    if (eventsPage > 1) {
        eventsPage--;
        loadEvents();
    }
}

function nextEventsPage() {
    eventsPage++;
    loadEvents();
}

function changeEventsPageSize() {
    eventsPerPage = parseInt(document.getElementById('events-page-size').value);
    eventsPage = 1;
    loadEvents();
}

// Helper functions
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function truncateText(text, maxLen) {
    if (!text) return '-';
    if (text.length <= maxLen) return text;
    return text.substring(0, maxLen) + '...';
}
</script>
{% endblock %}
