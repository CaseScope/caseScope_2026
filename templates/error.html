{% extends "base.html" %}

{% block title %}Error {{ error_code }} - CaseScope 2026{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 0;">
    <div style="font-size: 6rem; margin-bottom: 1rem;">
        {% if error_code == 404 %}🔍{% else %}⚠️{% endif %}
    </div>
    <h1 style="font-size: 3rem; margin-bottom: 1rem;">Error {{ error_code }}</h1>
    <p style="font-size: 1.25rem; color: var(--color-text-secondary); margin-bottom: 2rem;">
        {{ error_message }}
    </p>
    <a href="/" class="btn btn-primary">← Back to Dashboard</a>
</div>
{% endblock %}
